<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic · Tac · Toe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&display=swap');

  :root{
    --slate: #2b3a34;
    --slate-dark: #202b26;
    --chalk: #f2efe3;
    --chalk-dim: #cfcabb;
    --chalk-x: #f0c869;
    --chalk-o: #7ec8e3;
    --chalk-win: #e88ba0;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(ellipse at 20% 15%, rgba(255,255,255,0.03), transparent 40%),
      radial-gradient(ellipse at 80% 85%, rgba(255,255,255,0.03), transparent 45%),
      var(--slate);
    font-family: 'Patrick Hand', cursive;
    color: var(--chalk);
    overflow:hidden;
  }

  /* subtle chalkboard texture */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:0.05;
    background-image:
      repeating-linear-gradient(0deg, #fff 0px, transparent 1px, transparent 3px),
      repeating-linear-gradient(90deg, #fff 0px, transparent 1px, transparent 3px);
    mix-blend-mode: overlay;
  }

  .board-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
    padding:28px 32px 34px;
    position:relative;
    z-index:1;
  }

  h1{
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:3rem;
    letter-spacing:4px;
    margin:0;
    color: var(--chalk);
    text-shadow: 0 0 14px rgba(242,239,227,0.15);
    transform: rotate(-1.2deg);
  }
  h1 span{ color: var(--chalk-dim); font-size: 0.6em; }

  .status{
    font-family:'Caveat', cursive;
    font-size:1.6rem;
    min-height: 1.6rem;
    color: var(--chalk-dim);
    transform: rotate(0.6deg);
  }
  .status.win-x{ color: var(--chalk-x); }
  .status.win-o{ color: var(--chalk-o); }
  .status.draw{ color: var(--chalk-win); }

  .grid{
    position:relative;
    width: min(340px, 78vw);
    height: min(340px, 78vw);
  }

  svg.gridlines{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }
  svg.gridlines path{
    stroke: var(--chalk);
    stroke-width: 3;
    fill: none;
    opacity: 0.75;
    stroke-linecap: round;
    filter: url(#chalkTexture);
  }

  .cells{
    position:relative;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    width:100%;
    height:100%;
  }

  .cell{
    display:flex;
    align-items:center;
    justify-content:center;
    background:transparent;
    border:none;
    cursor:pointer;
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size: min(4.2rem, 13vw);
    color: var(--chalk);
    user-select:none;
    -webkit-tap-highlight-color: transparent;
  }
  .cell:disabled{ cursor:default; }
  .cell .mark{
    opacity:0;
    transform: scale(0.4) rotate(-8deg);
    transition: transform 0.28s cubic-bezier(.34,1.56,.64,1), opacity 0.2s ease;
  }
  .cell .mark.show{
    opacity:1;
    transform: scale(1) rotate(0deg);
  }
  .cell .mark.x{ color: var(--chalk-x); }
  .cell .mark.o{ color: var(--chalk-o); }

  .cell:not(:disabled):hover .ghost{
    opacity:0.25;
  }
  .ghost{
    position:absolute;
    opacity:0;
    transition: opacity 0.15s ease;
    color: var(--chalk-dim);
  }

  .win-line{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }
  .win-line path{
    stroke: var(--chalk-win);
    stroke-width: 6;
    fill:none;
    stroke-linecap: round;
    filter: url(#chalkTexture);
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    opacity: 0;
  }
  .win-line path.draw{
    animation: strike 0.5s ease forwards;
  }
  @keyframes strike{
    0%{ opacity:1; stroke-dashoffset:400; }
    100%{ opacity:1; stroke-dashoffset:0; }
  }

  .controls{
    display:flex;
    align-items:center;
    gap:22px;
    margin-top: 4px;
  }

  .score{
    display:flex;
    gap:18px;
    font-family:'Caveat', cursive;
    font-size:1.3rem;
    color: var(--chalk-dim);
  }
  .score b.x{ color: var(--chalk-x); }
  .score b.o{ color: var(--chalk-o); }

  button.reset{
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:1.3rem;
    background:transparent;
    color: var(--chalk);
    border: 2px solid var(--chalk-dim);
    border-radius: 8px;
    padding: 6px 18px;
    cursor:pointer;
    transform: rotate(-0.8deg);
    transition: background 0.15s ease, transform 0.1s ease;
  }
  button.reset:hover{
    background: rgba(242,239,227,0.08);
    transform: rotate(-0.8deg) scale(1.03);
  }
  button.reset:active{ transform: rotate(-0.8deg) scale(0.97); }

  @media (prefers-reduced-motion: reduce){
    .cell .mark, button.reset, .win-line path{ transition:none; animation:none; }
  }
</style>
</head>
<body>

<div class="board-wrap">
  <h1>Tic <span>·</span> Tac <span>·</span> Toe</h1>
  <div class="status" id="status">Player X's turn</div>

  <div class="grid">
    <svg class="gridlines" viewBox="0 0 300 300">
      <defs>
        <filter id="chalkTexture" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="noise" seed="7"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="4"/>
        </filter>
      </defs>
      <path d="M 101 12 C 99 90, 103 200, 100 288"/>
      <path d="M 201 10 C 198 100, 203 190, 200 290"/>
      <path d="M 12 101 C 90 99, 200 103, 288 100"/>
      <path d="M 10 201 C 100 198, 190 203, 290 200"/>
    </svg>

    <div class="cells" id="cells"></div>

    <svg class="win-line" viewBox="0 0 300 300" id="winLineSvg">
      <defs>
        <filter id="chalkTexture2" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="noise" seed="3"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="4"/>
        </filter>
      </defs>
      <path id="winPath" filter="url(#chalkTexture)"/>
    </svg>
  </div>

  <div class="controls">
    <div class="score">
      <span>X: <b class="x" id="scoreX">0</b></span>
      <span>O: <b class="o" id="scoreO">0</b></span>
      <span>Ties: <b id="scoreT">0</b></span>
    </div>
  </div>
  <button class="reset" id="resetBtn">New round</button>
</div>

<script>
(function(){
  const cellsEl = document.getElementById('cells');
  const statusEl = document.getElementById('status');
  const resetBtn = document.getElementById('resetBtn');
  const winPath = document.getElementById('winPath');
  const scoreXEl = document.getElementById('scoreX');
  const scoreOEl = document.getElementById('scoreO');
  const scoreTEl = document.getElementById('scoreT');

  const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  // line endpoints in the 300x300 viewbox, per winning combo (approx cell centers: 50,150,250)
  const LINE_COORDS = {
    '0,1,2': [50,50, 250,50],
    '3,4,5': [50,150, 250,150],
    '6,7,8': [50,250, 250,250],
    '0,3,6': [50,50, 50,250],
    '1,4,7': [150,50, 150,250],
    '2,5,8': [250,50, 250,250],
    '0,4,8': [40,40, 260,260],
    '2,4,6': [260,40, 40,260]
  };

  let board = Array(9).fill(null);
  let current = 'X';
  let active = true;
  let scores = { X: 0, O: 0, T: 0 };

  function buildBoard(){
    cellsEl.innerHTML = '';
    for(let i=0;i<9;i++){
      const btn = document.createElement('button');
      btn.className = 'cell';
      btn.setAttribute('data-index', i);
      btn.setAttribute('aria-label', 'Cell ' + (i+1));
      btn.innerHTML = '<span class="mark"></span>';
      btn.addEventListener('click', onCellClick);
      cellsEl.appendChild(btn);
    }
  }

  function onCellClick(e){
    const idx = Number(e.currentTarget.getAttribute('data-index'));
    if(!active || board[idx]) return;
    placeMark(idx, current);

    const winInfo = checkWin();
    if(winInfo){
      endGame(winInfo);
      return;
    }
    if(board.every(c => c)){
      active = false;
      statusEl.textContent = "It's a tie!";
      statusEl.className = 'status draw';
      scores.T++;
      scoreTEl.textContent = scores.T;
      return;
    }
    current = current === 'X' ? 'O' : 'X';
    statusEl.textContent = "Player " + current + "'s turn";
    statusEl.className = 'status';
  }

  function placeMark(idx, player){
    board[idx] = player;
    const cell = cellsEl.children[idx];
    cell.disabled = true;
    const mark = cell.querySelector('.mark');
    mark.textContent = player;
    mark.classList.add(player.toLowerCase(), 'show');
  }

  function checkWin(){
    for(const line of WIN_LINES){
      const [a,b,c] = line;
      if(board[a] && board[a] === board[b] && board[a] === board[c]){
        return { player: board[a], line };
      }
    }
    return null;
  }

  function endGame(winInfo){
    active = false;
    statusEl.textContent = "Player " + winInfo.player + " wins!";
    statusEl.className = 'status ' + (winInfo.player === 'X' ? 'win-x' : 'win-o');
    scores[winInfo.player]++;
    (winInfo.player === 'X' ? scoreXEl : scoreOEl).textContent = scores[winInfo.player];

    const key = winInfo.line.join(',');
    const [x1,y1,x2,y2] = LINE_COORDS[key];
    winPath.setAttribute('d', `M ${x1} ${y1} L ${x2} ${y2}`);
    winPath.classList.remove('draw');
    void winPath.getBBox();
    winPath.classList.add('draw');
  }

  function newRound(){
    board = Array(9).fill(null);
    current = 'X';
    active = true;
    statusEl.textContent = "Player X's turn";
    statusEl.className = 'status';
    winPath.classList.remove('draw');
    winPath.removeAttribute('d');
    buildBoard();
  }

  resetBtn.addEventListener('click', newRound);

  buildBoard();
})();
</script>

</body>
</html>
